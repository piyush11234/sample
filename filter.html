<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>filter</title>
    <style>
        .box1{
            width: 80%;
            height: 300px;
            margin: auto;
            padding: 4px;
            background-color: aquamarine;
            color: red;
            border: 4px solid black;
            background-image: url("image2.jpg");
            background-repeat: no repeat;
            background-size: cover;


        }
        .box1:hover{
            width: 80%;
            height: 300px;
            margin: auto;
            padding: 4px;
            background-color: aquamarine;
            color: red;
            border: 4px solid black;
            box-shadow: 10px 10px 10px rgb(4, 15, 15);
            filter: brightness(300%);
        }
    </style>
</head>
<body>
    <div class="box1">
        <center><h2>this is vivek dibba</h2></center>
    </div>
</body>
</html>
