<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position2</title>
    <style>
        html{
            scroll-behavior: smooth;
        }
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        body{
            background-color: black;
        }
        .box1{
            width: 100%;
            height: 80px;
            background-color: blue;

        }
        .navbar{
            width: 100%;
            height: 80px;
            background-color: brown;
            position: sticky;
            top: 0px;
        }
        .sectionA{
            width: 100%;
            height: 600px;
            background-color: aqua;
        }
        .sectionB{
            width: 100%;
            height: 600px;
            background-color: darkblue;
        }
        .sectionC{
            width: 100%;
            height: 600px;
            background-color: rebeccapurple;
        }
        footer{
            width: 100%;
            height: 200px;
            background-color: black;
            color: white;
        }
        .arrow{
            width: 50px;
            height: 50px;
            background-color: aliceblue;
            border-radius: 50%;
            padding: 10px;
            position: fixed;
            right: 10px;
            bottom: 50px;
        }
        .arroe img{
            width: 50px;
            height: 50px;
            

        }
    </style>
</head>
<body>
    <header id="top">
        <div class="box1">social media links</div>
        <div class="navbar">homw | about | contact</div>
        <section class="sectionA">setion A</section>
        <section class="sectionB">setion B</section>
        <section class="sectionC">setion C</section>
        <div class="arrow"><a href="#top"><img src="arrow.svg" alt=""></a></div>
        <footer><center>&copy; footer ban gya</center></footer>
    </header>
    
</body>
</html>
