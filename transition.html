<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transition</title>
    <style>
        .box1{
            width: 80%;
            margin: auto;
            padding: 4px;
           
            background-color: rgb(0, 0, 0);
            border: 2px solid black;
        }
        .B{
            width: 100px;
            height: 100px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .boxA{
            background-color: bisque;
            transition: width 2s ease;
        }
        .boxA:hover{
            width: 100%;
            height: 200px;
        }
        .boxB{
            background-color: blueviolet;
            transition: width 2s ease-in;
        }
        .boxB:hover{
            width: 100%;
            height: 200px;
        }
        .boxC{
            background-color: cornflowerblue;
            transition: width 2s ease-out;
        }
        .boxC:hover{
            width: 100%;
            height: 200px;
        }
        .boxD{
            background-color: darkgray;
            transition: width 2s ease-in-out;
        }
        .boxD:hover{
            width: 100%;
            height: 200px;
        }
        .boxE{
            background-color: yellow;
            transition: width 2s linear;
        }
        .boxE:hover{
            width: 100%;
            height: 200px;
        }
        .boxF{
            background-color: rgb(255, 0, 255);
            transition: all 2s steps(5);
        }
        .boxF:hover{
            transform: rotate(360deg);
        }
        .boxG{
            background-color: darkgray;
            transition: all 2s linear;
        }
        .boxG:hover{
            width: 100%;
            height: 200px;
            transform: rotate(360deg);
        }
    </style>
</head>
<body>
    <div class="box1">
        <div class="B boxA">A</div>
        <div class="B boxB">B</div>
        <div class="B boxC">C</div>
        <div class="B boxD">D</div>
        <div class="B boxE">E</div>
        <div class="B boxF">F</div>
        <div class="B boxG">G</div>

        </amet>
    </div>
</body>
</html>
